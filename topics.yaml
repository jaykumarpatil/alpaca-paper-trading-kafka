version: 1
cluster_defaults:
  replication_factor: 3
  min_insync_replicas: 2
  cleanup_policy: delete
  retention_ms: 604800000
  compression_type: zstd
topics:
  - name: md.instruments.v1
    partitions: 24
    key: symbol
  - name: md.quotes.v1
    partitions: 96
    key: symbol
  - name: md.trades.v1
    partitions: 96
    key: symbol
  - name: md.bars.v1
    partitions: 48
    key: symbol
  - name: alpha.signals.v1
    partitions: 64
    key: strategyId
  - name: alpha.positionIntents.v1
    partitions: 64
    key: strategyId
  - name: risk.decisions.v1
    partitions: 64
    key: strategyId
  - name: oms.orders.v1
    partitions: 64
    key: orderId
  - name: oms.execReports.v1
    partitions: 64
    key: orderId
  - name: portfolio.updates.v1
    partitions: 32
    key: accountId
  - name: audit.decisions.v1
    partitions: 96
    key: eventId
    retention_ms: 31536000000

consumer_profiles:
  live_strategy:
    max_poll_records: 50
    max_poll_interval_ms: 120000
  risk:
    max_poll_records: 100
  backtest:
    max_poll_records: 500
